name: 'Terraform CI/CD'
on:
  push:
    branches:
      - main
concurrency:
  group: ${{ github.repository }}
#OIDCトークンを発行権限を付与
permissions:
  contents: 'read'
  id-token: 'write'
##########################
# GCP前段セットアップ
##########################

jobs:
  gcloud_1st_setup:
    runs-on: ubuntu-latest
    outputs:
      env_folder_id: ${{ steps.env_folder_id_check.outputs.ENV_FOLDER_ID }}
    environment:
      name: github_actions
      
    steps:
# 読み取りファイルの同期
    - name: Checkout repository
      uses: actions/checkout@v6

# 変数ファイル（main.env）の読み込み
    - name: Load main.env
      run: |
          tr -d '\r' < config/main.env | grep -v '^[[:space:]]*#' | grep '=' >> $GITHUB_ENV

# OIDC認証
    - name: Checkout repository
      uses: actions/checkout@v6
    - uses: google-github-actions/auth@v3
      with:
        workload_identity_provider: ${{env.WORKLOAD_IDENTITY_PROVIDER}}
        service_account: ${{env.OIDC_SA}}

# Gcloudインストール
    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v3

#gcloudの環境確認：
    - name: Use gcloud CLI
      run: gcloud info

# 動作確認：gcp-it-architectのフォルダ配下情報の取得して認証が成功しているかどうかをチェック
    - name: GCP-auth-check
      run: |
           gcloud resource-manager folders list \
             --folder=${{env.ROOT_FOLDER_ID}}  \
             --format json
 
# 案件用フォルダの作成(既に作成済みの場合はスキップ)
    - name: folder-create-prj
      run: |
        EXISTING_PROJECT_FOLDER=$(gcloud resource-manager folders list --folder=${{ env.ROOT_FOLDER_ID }} --format="value(name)" --filter="displayName:${{ env.PROJECT_FOLDER_NAME }}")

        if [ -z "$EXISTING_PROJECT_FOLDER" ]; then
          gcloud resource-manager folders create \
            --display-name=${{ env.PROJECT_FOLDER_NAME }} \
            --folder=${{ env.ROOT_FOLDER_ID }}
          EXISTING_PROJECT_FOLDER=$(gcloud resource-manager folders list --folder=${{ env.ROOT_FOLDER_ID }} --format="value(name)" --filter="displayName:${{ env.PROJECT_FOLDER_NAME }}")
        else
          echo "案件用フォルダは既に存在するため、作成をスキップします。"
        fi
        PROJECT_FOLDER_ID=$(echo $EXISTING_PROJECT_FOLDER | sed 's/folders\///')
        echo "PROJECT_FOLDER_ID=$PROJECT_FOLDER_ID" >> $GITHUB_ENV

# 環境用フォルダを作成する
    - name: folder-create-env
      run: |
        # gcloud resource-manager folders create \
        # --display-name=${{ env.ENV_FOLDER_NAME }} \
        # --folder=${{ env.PROJECT_FOLDER_ID }}
        CREATED_ENV_FOLDER=$(gcloud resource-manager folders list --folder=${{ env.PROJECT_FOLDER_ID }} --format="value(name)" --filter="displayName:${{ env.ENV_FOLDER_NAME }}")        
        ENV_FOLDER_ID=$(echo $CREATED_ENV_FOLDER | sed 's/folders\///')
        echo "ENV_FOLDER_ID=$ENV_FOLDER_ID" >> $GITHUB_ENV              

# Terraform実行用SAの作成
    - name: service-account-create
      run: |
           gcloud iam service-accounts create ${{env.SERVICE_ACCOUNT_ID}} \
            --display-name=${{env.DISPLAY_NAME}} \
            --project=${{env.COMMON_PROJECT_ID}}
            SA_EMAIL="${{ env.SERVICE_ACCOUNT_ID }}@${{ env.COMMON_PROJECT_ID }}.iam.gserviceaccount.com"
            echo "SA_EMAIL=$SA_EMAIL" >> $GITHUB_ENV

# Terraform実行用SAに環境フォルダへの権限付与
    - name: add-iam-policy-folder
      run: |
        gcloud resource-manager folders add-iam-policy-binding ${{ env.ENV_FOLDER_ID }} \
          --member="serviceAccount:${{ env.SA_EMAIL }}" --role='roles/owner'
          
        gcloud resource-manager folders add-iam-policy-binding ${{ env.ENV_FOLDER_ID }} \
          --member="serviceAccount:${{ env.SA_EMAIL }}" --role='roles/resourcemanager.projectCreator'
          
        gcloud resource-manager folders add-iam-policy-binding ${{ env.ENV_FOLDER_ID }} \
          --member="serviceAccount:${{ env.SA_EMAIL }}" --role='roles/compute.xpnAdmin'
          
        gcloud resource-manager folders add-iam-policy-binding ${{ env.ENV_FOLDER_ID }} \
          --member="serviceAccount:${{ env.SA_EMAIL }}" --role='roles/resourcemanager.folderAdmin'

# Terraform実行用SAのグループ追加
#    - name: groups-memberships-add
#      run: |
#           gcloud identity groups memberships add \
#           --group-email="${{env.RESERVEDGROUP_EMAIL}}" \
#            --member-email="${{env.SA_EMAIL}}"

# VPC-SC更新_IaC実行用SAの許可設定追加(不要)
#    - name: vpc-sc-update-1
#      run: |
#           gcloud access-context-manager perimeters update ${{env.VPC_SC_NAME_tf}} \
#            --policy=${{env.VPC_SC_POLICY_ID}} --set-ingress-policies=./vsc_yml/${{env.VPC_SC_YAML_FILE_tf}}

# 一時的なStateファイル管理用GCSの作成
    - name: gcs-create-tfstate-bucket
      run: |                
        BUCKET_NAME="ss-${{ env.PROJECT_CODE }}-${{ env.PROJECT_ENV }}-tfstate-000001"                              
        gcloud storage buckets create gs://${BUCKET_NAME} \
          --project=${{ env.COMMON_PROJECT_ID }} \
          --location=asia-northeast1 \
          --uniform-bucket-level-access
        gcloud storage buckets update gs://${BUCKET_NAME} --versioning

#Terraform実行に必要な案件用フォルダIDを引き渡す
    - name: env-folder-id-check
      id: env_folder_id_check
      run: |
        echo "ENV_FOLDER_ID=${{ env.ENV_FOLDER_ID }}" >> "$GITHUB_OUTPUT"